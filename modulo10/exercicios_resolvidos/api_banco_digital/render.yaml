# Arquivo de configuração do Render para publicar a API LionsBank.
services:
  - type: web
    name: api-banco-digital-lionsbank
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "1d"
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      - key: LIMITE_PIX_DIARIO_CENTAVOS
        value: "500000"
